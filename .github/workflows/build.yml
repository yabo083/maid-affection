name: Build & Release

on:
  push:
    branches: [ main, forge-1.20.1 ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, forge-1.20.1 ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ (github.ref_name == 'forge-1.20.1' || contains(github.ref_name, 'forge1.20.1')) && '17' || '21' }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touhou-maid-affection-${{ github.ref_name }}
          path: build/libs/touhou-maid-affection-*.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ (github.ref_name == 'forge-1.20.1' || contains(github.ref_name, 'forge1.20.1')) && '17' || '21' }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/touhou-maid-affection-*.jar
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != ''
        run: |
          chmod +x ./gradlew
          ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
