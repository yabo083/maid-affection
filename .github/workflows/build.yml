name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touhou-maid-affection
          path: build/libs/touhou-maid-affection-*.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/touhou-maid-affection-*.jar
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != ''
        run: |
          chmod +x ./gradlew
          ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: Resolve release jar
        id: release_jar
        shell: bash
        run: |
          JAR_PATH=$(ls build/libs/touhou-maid-affection-*.jar | grep -v '\-sources\.jar' | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No release jar found in build/libs"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved jar: $JAR_PATH"

      - name: Publish to CurseForge
        if: env.CURSEFORGE_TOKEN != '' && vars.CURSEFORGE_PROJECT_ID != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          game_endpoint: minecraft
          file_path: ${{ steps.release_jar.outputs.jar_path }}
          game_versions: "Minecraft 1.21:1.21.1,Java 21,NeoForge"
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
